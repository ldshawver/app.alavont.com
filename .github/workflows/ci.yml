name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.26.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library declarations
        run: pnpm typecheck:libs

      - name: Full TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Lint warning ratchet
        run: pnpm lint:ratchet

      - name: Run tests
        run: pnpm test
