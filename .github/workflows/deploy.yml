name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy (optional)"
        required: false
        default: "Manual re-deploy"

jobs:
  test:
    name: Type Check & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.26.1"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library declarations
        run: pnpm typecheck:libs

      - name: Full TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Lint warning ratchet
        run: pnpm lint:ratchet

      - name: Run tests
        run: pnpm test

  deploy:
    name: Build → Cert → Sync → Restart
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show commit being deployed
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          git rev-parse HEAD
          git log --oneline -n 1
          git status --short

      - name: Pre-deploy integrity guard
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  PRE-DEPLOY INTEGRITY CHECK"
          echo "════════════════════════════════════════════════════════"

          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          EXPECTED_SHA="${{ github.sha }}"

          echo "  Expected SHA : $EXPECTED_SHA"
          echo "  Checked-out  : $CHECKED_OUT_SHA"

          if [ "$CHECKED_OUT_SHA" != "$EXPECTED_SHA" ]; then
            echo ""
            echo "  ✗ SHA MISMATCH — aborting."
            exit 1
          fi

          echo "  ✓ SHA match confirmed"

          DIRTY="$(git status --porcelain)"
          if [ -n "$DIRTY" ]; then
            echo ""
            echo "  ✗ DIRTY WORKING TREE — aborting."
            echo "$DIRTY" | sed 's/^/    /'
            exit 1
          fi

          echo "  ✓ Working tree clean"
          echo "  SHA:     $EXPECTED_SHA"
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Message: $(git log -1 --pretty=%s)"
          echo "════════════════════════════════════════════════════════"

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='deploy/.env' \
            --exclude='deploy/nginx/ssl' \
            --exclude='node_modules' \
            --exclude='**/node_modules' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/alavont/

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "chmod +x /opt/alavont/deploy/renew-cert.sh || true"

      - name: Clean stale node_modules on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "find /opt/alavont -name node_modules -type d -not -path '*/\.*' | xargs rm -rf 2>/dev/null || true"

      - name: Build images
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e

            echo "Building from source synced at: $(date -u)"
            echo "Baking SHA into Docker image: ${{ github.sha }}"

            echo "${{ github.sha }}" > /opt/alavont/.deployed-sha
            echo "${{ github.ref_name }}" >> /opt/alavont/.deployed-sha
            echo "$(date -u)" >> /opt/alavont/.deployed-sha

            docker builder prune -af

            cd /opt/alavont/deploy
            DEPLOY_SHA="${{ github.sha }}" docker compose build --pull

            echo "BUILD SUCCESS — SHA ${{ github.sha }}"
          ENDSSH

      - name: Deploy with cert renewal
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e

            cd /opt/alavont/deploy
            DOMAIN="myorder.fun"

            echo "▶ Stopping all services..."
            docker compose down 2>&1 || true
            sleep 3

            echo "▶ Checking / renewing SSL cert..."
            if certbot renew --standalone --quiet --cert-name "${DOMAIN}" 2>/dev/null || \
               certbot certonly --standalone \
                 -d "${DOMAIN}" -d "www.${DOMAIN}" \
                 --non-interactive --agree-tos \
                 --register-unsafely-without-email \
                 --quiet 2>/dev/null; then
              echo "  ✓ Cert OK — copying to nginx/ssl/..."
              mkdir -p nginx/ssl
              cp /etc/letsencrypt/live/${DOMAIN}/fullchain.pem nginx/ssl/fullchain.pem
              cp /etc/letsencrypt/live/${DOMAIN}/privkey.pem nginx/ssl/privkey.pem
              chmod 644 nginx/ssl/fullchain.pem
              chmod 600 nginx/ssl/privkey.pem
            else
              echo "  ⚠ certbot failed — using existing certs"
            fi

            echo "▶ Starting database..."
            docker compose up -d db

            echo "▶ Waiting 20s for postgres..."
            sleep 20

            echo "▶ Running migrations..."
            docker compose run --rm migrate
            echo "MIGRATE SUCCESS"

            echo "▶ Starting all services..."
            docker compose up -d

            docker image prune -f

            echo ""
            echo "════════════════════════════════════════════════════════"
            echo "  DEPLOY SUCCESS — $(date -u)"
            echo "  SHA: ${{ github.sha }}"
            echo "════════════════════════════════════════════════════════"
          ENDSSH
