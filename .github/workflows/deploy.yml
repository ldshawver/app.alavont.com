name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build → Cert → Sync → Restart
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Check out the code on the Actions runner ────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up SSH agent with the VPS private key ───────────────
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # ── 3. Trust the VPS host fingerprint ──────────────────────────
      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── 4. Rsync source code to VPS (skip .env and ssl certs) ──────
      - name: Sync code to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='deploy/.env' \
            --exclude='deploy/nginx/ssl' \
            --exclude='node_modules' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/alavont/
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "chmod +x /opt/alavont/deploy/renew-cert.sh"

      # ── 5. Build new images ─────────────────────────────────────────
      - name: Build images
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /opt/alavont/deploy
            docker compose build --pull
            echo "BUILD SUCCESS"
          ENDSSH

      # ── 6. Stop services, renew cert if needed, then redeploy ───────
      - name: Deploy (with cert renewal)
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /opt/alavont/deploy
            DOMAIN="myorder.fun"

            echo "▶ Stopping all services (data volumes preserved)..."
            docker compose down 2>&1
            sleep 3

            # ── Cert renewal while nginx is stopped (port 80 is free) ──
            echo "▶ Checking / renewing SSL cert..."
            if certbot renew --standalone --quiet --cert-name "${DOMAIN}" 2>/dev/null || \
               certbot certonly --standalone \
                 -d "${DOMAIN}" -d "www.${DOMAIN}" \
                 --non-interactive --agree-tos \
                 --register-unsafely-without-email \
                 --quiet 2>/dev/null; then
              echo "  ✓ Cert OK — copying to nginx/ssl/..."
              mkdir -p nginx/ssl
              cp /etc/letsencrypt/live/${DOMAIN}/fullchain.pem nginx/ssl/fullchain.pem
              cp /etc/letsencrypt/live/${DOMAIN}/privkey.pem   nginx/ssl/privkey.pem
              chmod 644 nginx/ssl/fullchain.pem
              chmod 600 nginx/ssl/privkey.pem
            else
              echo "  ⚠ certbot failed — using existing certs"
            fi

            echo "▶ Starting database..."
            docker compose up -d db
            echo "▶ Waiting 20s for postgres to initialize..."
            sleep 20

            echo "▶ Running migrations..."
            docker compose run --rm migrate
            echo "MIGRATE SUCCESS"

            echo "▶ Starting all services..."
            docker compose up -d
            echo "DEPLOY SUCCESS"
            docker image prune -f
            echo ""
            echo "════════════════════════════════════"
            echo "  DEPLOY SUCCESS — $(date -u)"
            echo "════════════════════════════════════"
          ENDSSH
