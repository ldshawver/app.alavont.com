          type: string
      required: [reply]

    AiUpsellBody:
      type: object
      properties:
        cartItemIds:
          type: array
          items:
            type: integer
        orderId:
          type: integer
      required: [cartItemIds]

    AiUpsellResponse:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/CatalogItem"
        reasoning:
          type: string
      required: [suggestions]

