                type: number
        totalRevenue:
          type: number
        revenueToday:
          type: number
        revenueThisWeek:
          type: number
        averageOrderValue:
          type: number
      required: [byStatus, totalRevenue, revenueToday, revenueThisWeek, averageOrderValue]

    # ─── Order Notes ───
    OrderNote:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        authorId:
          type: integer
        authorName:
          type: string
        content:
          type: string
        isEncrypted:
          type: boolean
        isInternal:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, orderId, authorId, content, isEncrypted, isInternal, createdAt]

    OrderNotesResponse:
      type: object
      properties:
        notes:
          type: array
          items:
            $ref: "#/components/schemas/OrderNote"
      required: [notes]

    AddOrderNoteBody:
      type: object
      properties:
        content:
          type: string
        isEncrypted:
          type: boolean
        isInternal:
          type: boolean
      required: [content]

    # ─── Users ───
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [admin, supervisor, business_sitter, customer_service_rep, sales_rep, lab_tech, user]
        tenantId:
          type: integer
        tenantName:
          type: string
        mfaEnabled:
          type: boolean
        status:
          type: string
          enum: [pending, approved, rejected]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, clerkId, email, role, isActive, createdAt]

    UpdateUserRoleBody:
      type: object
      properties:
        role:
          type: string
          enum: [supervisor, business_sitter, customer_service_rep, sales_rep, lab_tech, user]
      required: [role]

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        total:
          type: integer
      required: [users, total]

    # ─── Audit Log ───
    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        actorId:
          type: integer
        actorEmail:
          type: string
        actorRole:
          type: string
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        metadata:
          type: object
          additionalProperties: true
        ipAddress:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, actorId, actorEmail, actorRole, action, createdAt]

    AuditLogListResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [entries, total, page, limit]

    # ─── AI ───
    AiChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required: [role, content]

    AiChatBody:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AiChatMessage"
        context:
          type: object
          properties:
            currentCartItems:
              type: array
              items:
                type: integer
            currentOrderId:
              type: integer
      required: [messages]

    AiChatResponse:
      type: object
      properties:
        reply:
          type: string
        suggestedItems:
          type: array
          items:
            $ref: "#/components/schemas/CatalogItem"
