openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: OrderFlow Platform API - Multi-tenant ordering platform with onboarding workflow
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: onboarding
    description: Tenant onboarding requests
  - name: tenants
    description: Tenant management (global admin)
  - name: catalog
    description: Product catalog management
  - name: orders
    description: Order management
  - name: users
    description: User management and RBAC
  - name: audit
    description: Audit log (global admin / tenant admin)
  - name: ai
    description: AI sales concierge
  - name: admin
    description: Global admin operations
  - name: notifications
    description: Order status notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─────────────── ONBOARDING ───────────────
  /onboarding/request:
    post:
      operationId: submitOnboardingRequest
      tags: [onboarding]
      summary: Submit a new tenant onboarding request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingRequestBody"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingRequest"

  /onboarding/requests:
    get:
      operationId: listOnboardingRequests
      tags: [onboarding]
      summary: List all onboarding requests (global admin)
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [submitted, pending_review, approved, rejected, invited, activated]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of onboarding requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingRequestListResponse"

  /onboarding/requests/{id}:
    get:
      operationId: getOnboardingRequest
      tags: [onboarding]
      summary: Get a specific onboarding request
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Onboarding request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingRequest"
    patch:
      operationId: updateOnboardingRequest
      tags: [onboarding]
      summary: Update onboarding request status (global admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOnboardingRequestBody"
      responses:
        "200":
          description: Updated onboarding request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingRequest"

  # ─────────────── TENANTS ───────────────
  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all tenants (global admin)
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"

  /tenants/{id}:
    get:
      operationId: getTenant
      tags: [tenants]
      summary: Get tenant details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update tenant settings
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantBody"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /tenants/{id}/summary:
    get:
      operationId: getTenantSummary
      tags: [tenants]
      summary: Tenant dashboard summary — order counts, revenue, top products
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSummary"

  # ─────────────── CATALOG ───────────────
  /catalog:
    get:
      operationId: listCatalogItems
      tags: [catalog]
      summary: List catalog items for the authenticated user's tenant
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: available
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: mode
          schema:
            type: string
      responses:
        "200":
          description: List of catalog items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItemListResponse"
    post:
      operationId: createCatalogItem
      tags: [catalog]
      summary: Create a new catalog item (tenant admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCatalogItemBody"
      responses:
        "201":
          description: Created catalog item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"

  /catalog/{id}:
    get:
      operationId: getCatalogItem
      tags: [catalog]
      summary: Get a catalog item by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Catalog item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"
    patch:
      operationId: updateCatalogItem
      tags: [catalog]
      summary: Update a catalog item (tenant admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCatalogItemBody"
      responses:
        "200":
          description: Updated catalog item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"
    delete:
      operationId: deleteCatalogItem
      tags: [catalog]
      summary: Delete a catalog item (tenant admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /catalog/categories:
    get:
      operationId: listCatalogCategories
      tags: [catalog]
      summary: List all distinct categories in the tenant catalog
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogCategoriesResponse"

  # ─────────────── ORDERS ───────────────
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (customers see their own; staff/admin see all in tenant)
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, confirmed, processing, ready, shipped, delivered, cancelled]
        - in: query
          name: customerId
          schema:
            type: integer
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (staff/admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/summary:
    get:
      operationId: getOrderSummary
      tags: [orders]
      summary: Order pipeline summary — counts by status, recent revenue
      responses:
        "200":
          description: Order summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderSummary"

  /orders/{id}/accept:
    post:
      operationId: acceptOrder
      tags: [orders]
      summary: CSR accepts a routed order (sets acceptedAt + status=processing)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/eta:
    patch:
      operationId: adjustOrderEta
      tags: [orders]
      summary: |
        Supervisor adjusts the customer hourglass estimatedReadyAt.

        Semantics: when `promisedMinutes` is supplied, the new
        estimatedReadyAt is computed as `now() + promisedMinutes` (a
        reset-from-now), not as an offset from the original routedAt or
        the current ETA. To shift the existing ETA by a delta, send the
        absolute target as `estimatedReadyAt` (ISO-8601) instead.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                estimatedReadyAt:
                  type: string
                  format: date-time
                  description: Absolute target time. Use this for delta-style adjustments.
                promisedMinutes:
                  type: integer
                  description: Resets ETA to now() + promisedMinutes. Does not stack with current ETA.
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/mark-ready:
    post:
      operationId: markOrderReady
      tags: [orders]
      summary: Mark order as ready for handoff
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/reassign:
    post:
      operationId: reassignOrder
      tags: [orders]
      summary: Supervisor reassigns an order to a different user (or to the General Account fallback queue)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assignedCsrUserId:
                  type: integer
                  nullable: true
              required: [assignedCsrUserId]
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/stream:
    get:
      operationId: orderEventStream
      tags: [orders]
      summary: |
        Server-Sent Events stream of realtime order events. Authentication is via the Clerk
        session cookie since EventSource cannot send Authorization headers. The server enforces
        recipient scoping per role: customers receive events for their own orders only; CSR
        roles receive events assigned to them or to the General Account fallback queue
        (assignedCsrUserId == null); supervisors and admins receive all events.

        Event names: `order.assigned` (new order routed), `order.updated` (status / ETA /
        accept / reassign), `order.ready` (marked ready). Each payload includes `orderId`,
        `customerId`, and `assignedCsrUserId` for client routing.
      responses:
        "200":
          description: text/event-stream
          content:
            text/event-stream: {}

  /orders/active-csrs:
    get:
      operationId: listActiveCsrs
      tags: [orders]
      summary: |
        Active CSR roster used by supervisor reassignment dropdowns. Returns
        currently clocked-in CSRs with their open shift id.
      responses:
        "200":
          description: Active CSRs
          content:
            application/json:
              schema:
                type: object
                required: [csrs]
                properties:
                  csrs:
                    type: array
                    items:
                      type: object
                      required: [userId, shiftId, name]
                      properties:
                        userId: { type: integer }
                        shiftId: { type: integer }
                        name: { type: string }

  /orders/recent-events:
    get:
      operationId: getRecentOrderEvents
      tags: [orders]
      summary: |
        Polling fallback for clients whose SSE stream is unavailable. Returns
        the most recent order events the caller is authorised to see, scoped
        with the same role rules as /orders/stream.
      parameters:
        - in: query
          name: since
          description: ISO-8601 timestamp; defaults to 60s ago when omitted.
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Recent order events
          content:
            application/json:
              schema:
                type: object
                required: [events, serverTime]
                properties:
                  events:
                    type: array
                    items:
                      type: object
                  serverTime:
                    type: string
                    format: date-time

  /orders/delayed:
    get:
      operationId: listDelayedOrders
      tags: [orders]
      summary: Orders that have passed their estimatedReadyAt without completion
      responses:
        "200":
          description: Delayed orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
                  total:
                    type: integer
                required: [orders, total]

  /orders/recent:
    get:
      operationId: getRecentOrders
      tags: [orders]
      summary: Recent orders activity feed
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  # ─────────────── USERS ───────────────
  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current authenticated user profile and role
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateCurrentUser
      tags: [users]
      summary: Update the current user's profile (name, phone, avatar)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCurrentUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required: [error]

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users in the tenant (admin only)
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [admin, supervisor, business_sitter, customer_service_rep, sales_rep, lab_tech, user]
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (tenant admin or global admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /admin/users/waitlist:
    get:
      operationId: listWaitlistEntries
      tags: [admin]
      summary: List waitlist entries pulled live from Clerk
      responses:
        "200":
          description: Waitlist entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistEntryListResponse"

  /admin/users/waitlist/{id}/invite:
    post:
      operationId: inviteWaitlistEntry
      tags: [admin]
      summary: Invite a waitlist entry with a chosen role; pre-creates an approved users row
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteWaitlistEntryBody"
      responses:
        "200":
          description: Invite result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteWaitlistEntryResponse"

  /admin/users/waitlist/{id}/reject:
    post:
      operationId: rejectWaitlistEntry
      tags: [admin]
      summary: Reject a waitlist entry in Clerk
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reject result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistActionResponse"

  /admin/users/pending:
    get:
      operationId: listPendingUsers
      tags: [admin]
      summary: List app users awaiting approval (status = 'pending')
      responses:
        "200":
          description: Pending users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /admin/users/{id}/approval:
    patch:
      operationId: setUserApproval
      tags: [admin]
      summary: Approve or reject a pending user (also pushes to Clerk publicMetadata)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetUserApprovalBody"
      responses:
        "200":
          description: Approval result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetUserApprovalResponse"

  /admin/users/{id}/role:
    patch:
      operationId: adminUpdateUserRole
      tags: [admin]
      summary: Admin alias for updating a user's role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /admin/users/{id}/status:
    patch:
      operationId: adminUpdateUserStatus
      tags: [admin]
      summary: Admin alias for updating a user's status (approved/rejected/deactivated/pending)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusBody"
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserStatusResponse"

  # ─────────────── AUDIT LOG ───────────────
  /audit:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit log entries (global admin / tenant admin)
      parameters:
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: actorId
          schema:
            type: integer
        - in: query
          name: tenantId
          schema:
            type: integer
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  # ─────────────── AI CONCIERGE ───────────────
  /ai/chat:
    post:
      operationId: aiConciergeChat
      tags: [ai]
      summary: Send a message to the AI sales concierge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatBody"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"

  /ai/upsell:
    post:
      operationId: aiUpsellSuggestions
      tags: [ai]
      summary: Get AI upsell suggestions based on current cart or order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiUpsellBody"
      responses:
        "200":
          description: Upsell suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiUpsellResponse"

  # ─────────────── NOTIFICATIONS ───────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      parameters:
        - in: query
          name: unreadOnly
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  # ─────────────── GLOBAL ADMIN ───────────────
  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Read tenant admin settings (includes order routing rule + default ETA)
      responses:
        "200":
          description: Admin settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"
    put:
      operationId: updateAdminSettings
      tags: [admin]
      summary: Update tenant admin settings (partial update)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminSettingsBody"
      responses:
        "200":
          description: Updated admin settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Global admin platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/mfa/setup:
    post:
      operationId: setupMfa
      tags: [admin]
      summary: Initiate MFA setup for global admin
      responses:
        "200":
          description: MFA setup data (TOTP QR code)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaSetupResponse"

  /admin/mfa/verify:
    post:
      operationId: verifyMfa
      tags: [admin]
      summary: Verify MFA token for global admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifyBody"
      responses:
        "200":
          description: MFA verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaVerifyResponse"

  # ─────────────── PAYMENTS ───────────────
  /payments/tokenize:
    post:
      operationId: tokenizePayment
      tags: [orders]
      summary: Create a payment token for an order (returns client secret for card element)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenizePaymentBody"
      responses:
        "200":
          description: Payment token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenizePaymentResponse"

  /payments/{orderId}/confirm:
    post:
      operationId: confirmPayment
      tags: [orders]
      summary: Confirm payment for an order
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPaymentBody"
      responses:
        "200":
          description: Payment confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ─────────────── PROTECTED NOTES ───────────────
  /orders/{id}/notes:
    get:
      operationId: getOrderNotes
      tags: [orders]
      summary: Get protected/encrypted notes for an order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderNotesResponse"
    post:
      operationId: addOrderNote
      tags: [orders]
      summary: Add a protected note to an order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOrderNoteBody"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderNote"

