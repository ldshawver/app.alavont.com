    # ─── Admin Settings (incl. order routing rule) ───
    OrderRoutingRule:
      type: string
      enum: [round_robin, least_recent_order, supervisor_manual_assignment]
      description: |
        Controls how new orders are assigned to active CSRs.
        round_robin (default): rotate through active CSRs in user-id order.
        least_recent_order: route to the active CSR who has gone the longest without a new order.
        supervisor_manual_assignment: skip auto-assignment; orders sit in the General Account queue until a supervisor reassigns.
    AdminSettings:
      type: object
      properties:
        id:
          type: integer
        orderRoutingRule:
          $ref: "#/components/schemas/OrderRoutingRule"
        defaultEtaMinutes:
          type: integer
          description: Default customer-hourglass duration (minutes) stamped on new orders.
          minimum: 1
        menuImportEnabled:
          type: boolean
        showOutOfStock:
          type: boolean
        autoPrintOnPayment:
          type: boolean
      required: [orderRoutingRule, defaultEtaMinutes]
      additionalProperties: true
    UpdateAdminSettingsBody:
      type: object
      properties:
        orderRoutingRule:
