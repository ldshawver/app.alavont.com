server {
    listen 80;
    server_name myorder.fun www.myorder.fun;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name myorder.fun www.myorder.fun;

    ssl_certificate     /etc/letsencrypt/live/myorder.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myorder.fun/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Frontend SPA — built to /root/alavont/artifacts/platform/dist
    root /root/alavont/artifacts/platform/dist;
    index index.html;

    # Serve static frontend files (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests (including Clerk proxy at /api/__clerk) to the Node.js server
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50M;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
