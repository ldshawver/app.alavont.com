worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Docker internal DNS — resolves service names dynamically (not at startup)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Port 80: direct proxy (for localhost health checks + ACME challenges)
    # Named-host traffic (myorder.fun) is redirected to HTTPS below.
    # Requests arriving via IP (127.0.0.1, internal) are served directly here.
    server {
        listen 80 default_server;
        server_name _;

        # ACME / Let's Encrypt challenge passthrough
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Direct API proxy on port 80 (used by internal health checks)
        location /api/ {
            set $api_host http://api:8080;
            proxy_pass         $api_host;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Direct platform proxy on port 80 (used by internal health checks)
        location / {
            set $platform_host http://platform:80;
            proxy_pass         $platform_host;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── Port 80: redirect myorder.fun → HTTPS
    server {
        listen 80;
        server_name myorder.fun www.myorder.fun;
        return 301 https://myorder.fun$request_uri;
    }

    # ── Port 443: HTTPS — main site
    server {
        listen 443 ssl;
        http2 on;
        server_name myorder.fun www.myorder.fun;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Proxy /api/* → API server
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            set $api_host http://api:8080;
            proxy_pass         $api_host;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_buffer_size       32k;
            proxy_buffers           8 32k;
            proxy_busy_buffers_size 64k;
        }

        # Platform SPA → platform container
        location / {
            set $platform_host http://platform:80;
            proxy_pass         $platform_host;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
